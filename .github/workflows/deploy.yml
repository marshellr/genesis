name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_USER: shellr
  DEPLOY_ROOT: /projects/genesis
  HEALTHCHECK_URL: https://shellr.net/health

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose --env-file infra/compose/.env.example -f infra/compose/docker-compose.yml config >/tmp/genesis-compose.yml

      - name: Build application image
        run: docker build -t genesis-app:${{ github.sha }} app

      - name: Create release bundle
        run: |
          set -euo pipefail
          rm -rf .release
          mkdir -p .release/payload

          for path in app infra scripts docs .github README.md .gitignore .env.example; do
            if [ -e "$path" ]; then
              cp -a --parents "$path" .release/payload/
            fi
          done

          tar -C .release/payload -czf .release/release.tgz .

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: .release/release.tgz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: .release

      - name: Prepare SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' '${{ secrets.DEPLOY_KNOWN_HOSTS }}' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release bundle to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REMOTE_RELEASE_DIR="$DEPLOY_ROOT/releases/$RELEASE_SHA"

          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$REMOTE_RELEASE_DIR'"
          scp -i ~/.ssh/id_ed25519 .release/release.tgz "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_RELEASE_DIR/release.tgz"

      - name: Run remote deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REMOTE_RELEASE_DIR="$DEPLOY_ROOT/releases/$RELEASE_SHA"

          ssh -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" "set -euo pipefail; tar -xzf '$REMOTE_RELEASE_DIR/release.tgz' -C '$REMOTE_RELEASE_DIR'; rm -f '$REMOTE_RELEASE_DIR/release.tgz'; chmod 750 '$REMOTE_RELEASE_DIR/scripts/deploy.sh' '$REMOTE_RELEASE_DIR/scripts/rollback.sh'; '$REMOTE_RELEASE_DIR/scripts/deploy.sh' '$RELEASE_SHA' '$REMOTE_RELEASE_DIR'"

      - name: Verify public health endpoint
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error "$HEALTHCHECK_URL")"
          printf '%s' "$response" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'
