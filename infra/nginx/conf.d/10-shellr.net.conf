server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name shellr.net;

    include /etc/nginx/snippets/tls_common.conf;
    include /etc/nginx/snippets/security_headers.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location = /dma {
        return 301 https://dma.shellr.net/;
    }

    location ^~ /dma/ {
        rewrite ^/dma/(.*)$ https://dma.shellr.net/$1 permanent;
    }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://app:80;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.shellr.net;

    include /etc/nginx/snippets/tls_common.conf;

    return 301 https://shellr.net$request_uri;
}
