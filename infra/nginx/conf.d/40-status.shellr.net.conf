server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name status.shellr.net;

    include /etc/nginx/snippets/tls_common.conf;
    include /etc/nginx/snippets/security_headers.conf;
    add_header Cache-Control "no-store" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location = / {
        root /usr/share/nginx/html/shellr/status;
        try_files /snapshot.html /index.html =404;
    }

    location = /status {
        return 302 /status/shellr;
    }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://genesis-monitoring-uptime-kuma:3001;
    }
}
