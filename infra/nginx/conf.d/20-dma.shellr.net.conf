server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dma.shellr.net;

    include /etc/nginx/snippets/tls_common.conf;
    include /etc/nginx/snippets/security_headers.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://ddragon.leagueoflegends.com data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://dma:80;
    }

    location / {
        include /etc/nginx/snippets/proxy_common.conf;
        proxy_pass http://dma:80;
    }
}
