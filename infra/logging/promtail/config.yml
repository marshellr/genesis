server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://genesis-logging-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
      - output:
          source: log

    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          host: shellr
          __path__: /var/lib/docker/containers/*/*-json.log

    relabel_configs:
      - source_labels: ['__path__']
        regex: '.*/([a-f0-9]{64})/.*-json.log'
        target_label: container_id
      - target_label: job
        replacement: docker
