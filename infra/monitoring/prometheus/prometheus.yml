global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: uptime-kuma
    metrics_path: /metrics
    basic_auth:
      username: shellr-admin
      password_file: /etc/prometheus/secrets/uptime-kuma-password
    static_configs:
      - targets:
          - uptime-kuma:3001
